<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Ideas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eff9;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a2e;
    --text2: #5a5a72;
    --text3: #9898b0;
    --accent: #534AB7;
    --accent-hover: #3C3489;
    --accent-light: #EEEDFE;
    --accent-light2: #CEC BF6;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --red: #c0392b;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }

  [data-theme="dark"] {
    --bg: #13121f;
    --surface: #1e1d2e;
    --surface2: #28273d;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.16);
    --text: #e8e8f4;
    --text2: #9898b4;
    --text3: #5a5a72;
    --accent: #7B72D4;
    --accent-hover: #9A94E0;
    --accent-light: #26215C;
    --teal-light: #04342C;
    --coral-light: #4A1B0C;
    --amber-light: #412402;
    --green-light: #173404;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Layout ── */
  .layout {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* ── Header ── */
  .top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 12px;
  }
  .app-brand { display: flex; align-items: center; gap: 10px; }
  .app-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
    flex-shrink: 0;
  }
  .app-title { font-size: 20px; font-weight: 600; color: var(--text); }
  .app-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .top-actions { display: flex; align-items: center; gap: 8px; }

  .btn-theme {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2); font-size: 17px;
    transition: background 0.15s, color 0.15s;
  }
  .btn-theme:hover { background: var(--surface2); color: var(--text); }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.97); }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.75rem;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.teal { color: var(--teal); }

  /* ── Project cards ── */
  .projects-list { display: flex; flex-direction: column; gap: 14px; }

  .project-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .project-card:hover { box-shadow: var(--shadow-md); }

  .project-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .proj-color-bar {
    width: 4px;
    height: 36px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .proj-info { flex: 1; min-width: 0; }
  .proj-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .proj-count { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ring */
  .ring-wrap {
    position: relative; width: 44px; height: 44px; flex-shrink: 0;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border2); stroke-width: 3.5; }
  .ring-fill { fill: none; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--text2);
  }

  .proj-actions { display: flex; gap: 2px; }
  .btn-icon {
    background: none; border: none;
    width: 30px; height: 30px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3); font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }
  .btn-icon.danger:hover { color: var(--red); background: #fff0f0; }

  .chevron { font-size: 16px; color: var(--text3); transition: transform 0.22s; }
  .chevron.open { transform: rotate(180deg); }

  /* progress bar */
  .proj-progress-bar {
    height: 2px;
    background: var(--border);
  }
  .proj-progress-fill {
    height: 2px;
    transition: width 0.45s ease;
  }

  /* body */
  .project-body { display: none; }
  .project-body.open { display: block; }

  .progress-label {
    padding: 8px 16px 2px;
    font-size: 11px; color: var(--text3);
    display: flex; justify-content: flex-end;
  }

  /* ideas */
  .ideas-list { padding: 8px 14px; display: flex; flex-direction: column; gap: 7px; }

  .idea-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, opacity 0.2s;
  }
  .idea-row:hover { border-color: var(--border2); }
  .idea-row.done { opacity: 0.5; }

  .idea-cb {
    margin-top: 2px;
    width: 16px; height: 16px;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .idea-content { flex: 1; min-width: 0; }

  .idea-title-line { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .idea-title {
    font-size: 14px; font-weight: 500; color: var(--text);
    word-break: break-word;
  }
  .idea-title.done-text { text-decoration: line-through; color: var(--text3); }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .badge-alta  { background: var(--coral-light); color: var(--coral); }
  .badge-media { background: var(--amber-light); color: var(--amber); }
  .badge-baja  { background: var(--green-light); color: var(--green); }

  .idea-desc {
    font-size: 12px; color: var(--text2);
    margin-top: 4px; line-height: 1.55;
    word-break: break-word;
  }

  .idea-date {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text3);
    margin-top: 5px;
  }
  .idea-date i { font-size: 12px; }
  .idea-date.overdue { color: var(--red); }

  .idea-row-actions { display: flex; gap: 2px; flex-shrink: 0; }

  /* empty */
  .empty {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--text3);
  }
  .empty i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--border2); }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .empty-desc { font-size: 13px; }

  /* add idea btn */
  .btn-add-idea {
    display: flex; align-items: center; gap: 7px;
    width: calc(100% - 28px);
    margin: 4px 14px 14px;
    padding: 8px 12px;
    background: none;
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    font-size: 13px; color: var(--text3);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-add-idea:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  /* ── Modals ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.42);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: 16px;
    backdrop-filter: blur(2px);
  }
  .overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    width: 100%; max-width: 440px;
    padding: 22px 22px 18px;
    animation: modal-in 0.18s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .btn-close {
    background: none; border: none;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3); font-size: 18px;
    transition: background 0.15s;
  }
  .btn-close:hover { background: var(--surface2); color: var(--text); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text2); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 11px;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(83,74,183,0.12);
  }
  .form-textarea { resize: vertical; min-height: 72px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* color picker */
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .c-dot {
    width: 26px; height: 26px;
    border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .c-dot:hover { transform: scale(1.15); }
  .c-dot.selected { border-color: var(--text); }

  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 18px; padding-top: 14px;
    border-top: 0.5px solid var(--border);
  }
  .btn-secondary {
    padding: 8px 16px;
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    font-size: 14px; cursor: pointer;
    color: var(--text2);
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--surface2); }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-md);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* responsive */
  @media (max-width: 520px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stats-bar .stat-card:last-child { grid-column: span 2; }
    .form-row { grid-template-columns: 1fr; }
    .top-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <div class="top-bar">
    <div class="app-brand">
      <div class="app-icon"><i class="ti ti-bulb"></i></div>
      <div>
        <div class="app-title">Agenda de Ideas</div>
        <div class="app-subtitle" id="subtitle">Cargando...</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn-theme" id="btn-theme" title="Cambiar tema" onclick="toggleTheme()">
        <i class="ti ti-moon" id="theme-icon"></i>
      </button>
      <button class="btn-primary" onclick="openProjectModal()">
        <i class="ti ti-plus"></i> Nuevo proyecto
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Proyectos</div>
      <div class="stat-value accent" id="stat-projects">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ideas totales</div>
      <div class="stat-value" id="stat-ideas">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completadas</div>
      <div class="stat-value teal" id="stat-done">0%</div>
    </div>
  </div>

  <!-- Projects -->
  <div class="projects-list" id="projects-list"></div>

</div>

<!-- Modal: Proyecto -->
<div class="overlay" id="modal-project">
  <div class="modal" role="dialog" aria-labelledby="mp-title">
    <div class="modal-header">
      <div class="modal-title" id="mp-title">Nuevo proyecto</div>
      <button class="btn-close" onclick="closeModal('modal-project')" aria-label="Cerrar"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label" for="proj-name">Nombre del proyecto</label>
      <input class="form-input" id="proj-name" placeholder="Ej: Rediseño web...">
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-project')">Cancelar</button>
      <button class="btn-primary" onclick="saveProject()"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Idea -->
<div class="overlay" id="modal-idea">
  <div class="modal" role="dialog" aria-labelledby="mi-title">
    <div class="modal-header">
      <div class="modal-title" id="mi-title">Nueva idea</div>
      <button class="btn-close" onclick="closeModal('modal-idea')" aria-label="Cerrar"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label" for="idea-title-inp">Título</label>
      <input class="form-input" id="idea-title-inp" placeholder="Ej: Crear landing page...">
    </div>
    <div class="form-group">
      <label class="form-label" for="idea-desc-inp">Descripción</label>
      <textarea class="form-textarea" id="idea-desc-inp" placeholder="Detalles opcionales..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="idea-priority">Prioridad</label>
        <select class="form-select" id="idea-priority">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Media</option>
          <option value="baja">🟢 Baja</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="idea-date">Fecha límite</label>
        <input class="form-input" id="idea-date" type="date">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-idea')">Cancelar</button>
      <button class="btn-primary" onclick="saveIdea()"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────────
const COLORS = ['#534AB7','#1D9E75','#D85A30','#D4537E','#BA7517','#378ADD','#3B6D11','#636363'];
const STORAGE_KEY = 'agenda_ideas_v2';

let state = load();
let editProjId = null, editIdeaId = null, activeProjId = null;
let selColor = COLORS[0];

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    projects: [],
    nextProjId: 1,
    nextIdeaId: 1,
    theme: 'light'
  };
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ─── Theme ──────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('theme-icon').className = state.theme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  save(); applyTheme();
}

// ─── Helpers ────────────────────────────────────────────────────────
function pct(ideas) {
  if (!ideas.length) return 0;
  return Math.round(ideas.filter(i => i.done).length / ideas.length * 100);
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

function isOverdue(d) {
  if (!d) return false;
  return new Date(d) < new Date(new Date().toDateString());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Stats ──────────────────────────────────────────────────────────
function updateStats() {
  const projs = state.projects;
  const total = projs.reduce((s, p) => s + p.ideas.length, 0);
  const done  = projs.reduce((s, p) => s + p.ideas.filter(i => i.done).length, 0);
  const pctDone = total ? Math.round(done / total * 100) : 0;

  document.getElementById('stat-projects').textContent = projs.length;
  document.getElementById('stat-ideas').textContent = total;
  document.getElementById('stat-done').textContent = pctDone + '%';
  document.getElementById('subtitle').textContent =
    `${projs.length} proyecto${projs.length !== 1 ? 's' : ''} · ${total} idea${total !== 1 ? 's' : ''}`;
}

// ─── Render ─────────────────────────────────────────────────────────
function render() {
  updateStats();
  const list = document.getElementById('projects-list');
  list.innerHTML = '';

  if (!state.projects.length) {
    list.innerHTML = `
      <div class="empty">
        <i class="ti ti-mood-empty"></i>
        <div class="empty-title">Sin proyectos todavía</div>
        <div class="empty-desc">Crea tu primer proyecto y empieza a organizar tus ideas.</div>
      </div>`;
    return;
  }

  state.projects.forEach(proj => {
    list.appendChild(buildProjectCard(proj));
  });
}

function buildProjectCard(proj) {
  const p = pct(proj.ideas);
  const r = 16, circ = 2 * Math.PI * r;
  const offset = circ - (p / 100 * circ);
  const done = proj.ideas.filter(i => i.done).length;

  const card = document.createElement('div');
  card.className = 'project-card';
  card.id = `pc-${proj.id}`;

  card.innerHTML = `
    <div class="project-header" onclick="toggleProj(${proj.id})" tabindex="0" role="button" aria-expanded="${proj.open}">
      <div class="proj-color-bar" style="background:${proj.color}"></div>
      <div class="proj-info">
        <div class="proj-name">${esc(proj.name)}</div>
        <div class="proj-count">${proj.ideas.length} idea${proj.ideas.length !== 1 ? 's' : ''} · ${done} completada${done !== 1 ? 's' : ''}</div>
      </div>
      <div class="ring-wrap">
        <svg width="44" height="44" viewBox="0 0 44 44" aria-hidden="true">
          <circle class="ring-bg" cx="22" cy="22" r="${r}"/>
          <circle class="ring-fill" cx="22" cy="22" r="${r}"
            stroke="${proj.color}"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="ring-pct">${p}%</div>
      </div>
      <div class="proj-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" title="Editar proyecto" onclick="editProj(${proj.id})" aria-label="Editar proyecto"><i class="ti ti-edit"></i></button>
        <button class="btn-icon danger" title="Eliminar proyecto" onclick="delProj(${proj.id})" aria-label="Eliminar proyecto"><i class="ti ti-trash"></i></button>
      </div>
      <i class="ti ti-chevron-down chevron${proj.open ? ' open' : ''}"></i>
    </div>
    <div class="proj-progress-bar">
      <div class="proj-progress-fill" style="width:${p}%;background:${proj.color}"></div>
    </div>
    <div class="project-body${proj.open ? ' open' : ''}" id="pb-${proj.id}">
      <div class="progress-label">${done}/${proj.ideas.length} completadas</div>
      <div class="ideas-list" id="il-${proj.id}">
        ${buildIdeasHTML(proj)}
      </div>
      <button class="btn-add-idea" onclick="openIdeaModal(${proj.id})">
        <i class="ti ti-plus"></i> Añadir idea
      </button>
    </div>
  `;

  return card;
}

function buildIdeasHTML(proj) {
  if (!proj.ideas.length) {
    return `<div style="text-align:center;padding:14px 0;color:var(--text3);font-size:13px">
      Sin ideas aún. ¡Añade la primera!
    </div>`;
  }
  return proj.ideas.map(idea => {
    const over = !idea.done && isOverdue(idea.date);
    return `
      <div class="idea-row${idea.done ? ' done' : ''}" id="ir-${idea.id}">
        <input type="checkbox" class="idea-cb" ${idea.done ? 'checked' : ''}
          onchange="toggleIdea(${proj.id},${idea.id})" aria-label="Marcar completada">
        <div class="idea-content">
          <div class="idea-title-line">
            <span class="idea-title${idea.done ? ' done-text' : ''}">${esc(idea.title)}</span>
            <span class="badge badge-${idea.priority}">${capFirst(idea.priority)}</span>
          </div>
          ${idea.desc ? `<div class="idea-desc">${esc(idea.desc)}</div>` : ''}
          ${idea.date ? `<div class="idea-date${over ? ' overdue' : ''}">
            <i class="ti ti-calendar"></i>${fmtDate(idea.date)}${over ? ' · Vencida' : ''}
          </div>` : ''}
        </div>
        <div class="idea-row-actions">
          <button class="btn-icon" title="Editar idea" onclick="editIdea(${proj.id},${idea.id})" aria-label="Editar idea"><i class="ti ti-edit"></i></button>
          <button class="btn-icon danger" title="Eliminar idea" onclick="delIdea(${proj.id},${idea.id})" aria-label="Eliminar idea"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function capFirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ─── Project actions ─────────────────────────────────────────────────
function toggleProj(id) {
  const p = state.projects.find(x => x.id === id);
  if (p) p.open = !p.open;
  save(); render();
}

function openProjectModal(editId = null) {
  editProjId = editId;
  const mp = document.getElementById('modal-project');
  const nameEl = document.getElementById('proj-name');

  if (editId) {
    const p = state.projects.find(x => x.id === editId);
    nameEl.value = p.name;
    selColor = p.color;
    document.getElementById('mp-title').textContent = 'Editar proyecto';
  } else {
    nameEl.value = '';
    selColor = COLORS[0];
    document.getElementById('mp-title').textContent = 'Nuevo proyecto';
  }
  buildColorPicker();
  mp.classList.add('active');
  setTimeout(() => nameEl.focus(), 80);
}

function editProj(id) { openProjectModal(id); }

function delProj(id) {
  const p = state.projects.find(x => x.id === id);
  if (!confirm(`¿Eliminar el proyecto "${p.name}" y todas sus ideas?`)) return;
  state.projects = state.projects.filter(x => x.id !== id);
  save(); render();
  showToast('Proyecto eliminado');
}

function saveProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { document.getElementById('proj-name').focus(); return; }

  if (editProjId) {
    const p = state.projects.find(x => x.id === editProjId);
    p.name = name; p.color = selColor;
    showToast('Proyecto actualizado');
  } else {
    state.projects.push({ id: state.nextProjId++, name, color: selColor, open: true, ideas: [] });
    showToast('Proyecto creado');
  }
  save();
  closeModal('modal-project');
  render();
}

// ─── Idea actions ────────────────────────────────────────────────────
function openIdeaModal(projId, editId = null) {
  activeProjId = projId;
  editIdeaId = editId;

  if (editId) {
    const p = state.projects.find(x => x.id === projId);
    const idea = p.ideas.find(i => i.id === editId);
    document.getElementById('idea-title-inp').value = idea.title;
    document.getElementById('idea-desc-inp').value = idea.desc || '';
    document.getElementById('idea-priority').value = idea.priority;
    document.getElementById('idea-date').value = idea.date || '';
    document.getElementById('mi-title').textContent = 'Editar idea';
  } else {
    document.getElementById('idea-title-inp').value = '';
    document.getElementById('idea-desc-inp').value = '';
    document.getElementById('idea-priority').value = 'media';
    document.getElementById('idea-date').value = '';
    document.getElementById('mi-title').textContent = 'Nueva idea';
  }
  document.getElementById('modal-idea').classList.add('active');
  setTimeout(() => document.getElementById('idea-title-inp').focus(), 80);
}

function editIdea(projId, ideaId) { openIdeaModal(projId, ideaId); }

function delIdea(projId, ideaId) {
  const p = state.projects.find(x => x.id === projId);
  p.ideas = p.ideas.filter(i => i.id !== ideaId);
  save(); render();
  showToast('Idea eliminada');
}

function saveIdea() {
  const title = document.getElementById('idea-title-inp').value.trim();
  if (!title) { document.getElementById('idea-title-inp').focus(); return; }

  const p = state.projects.find(x => x.id === activeProjId);
  if (editIdeaId) {
    const idea = p.ideas.find(i => i.id === editIdeaId);
    idea.title = title;
    idea.desc = document.getElementById('idea-desc-inp').value.trim();
    idea.priority = document.getElementById('idea-priority').value;
    idea.date = document.getElementById('idea-date').value;
    showToast('Idea actualizada');
  } else {
    p.ideas.push({
      id: state.nextIdeaId++,
      title,
      desc: document.getElementById('idea-desc-inp').value.trim(),
      priority: document.getElementById('idea-priority').value,
      date: document.getElementById('idea-date').value,
      done: false
    });
    showToast('Idea añadida');
  }
  save();
  closeModal('modal-idea');
  render();
}

function toggleIdea(projId, ideaId) {
  const p = state.projects.find(x => x.id === projId);
  const idea = p.ideas.find(i => i.id === ideaId);
  idea.done = !idea.done;
  save(); render();
}

// ─── Modal helpers ───────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.active').forEach(ov => ov.classList.remove('active'));
  }
});

// ─── Color picker ────────────────────────────────────────────────────
function buildColorPicker() {
  const cp = document.getElementById('color-picker');
  cp.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'c-dot' + (c === selColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { selColor = c; buildColorPicker(); };
    d.setAttribute('tabindex', '0');
    d.setAttribute('role', 'radio');
    d.setAttribute('aria-checked', c === selColor);
    d.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { selColor = c; buildColorPicker(); } };
    cp.appendChild(d);
  });
}

// ─── Init ────────────────────────────────────────────────────────────
applyTheme();
render();
</script>
</body>
</html>
